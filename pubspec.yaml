name: taller_itla_app
description: Aplicación de gestión vehicular - ITLA
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_html: ^3.0.0
  go_router: ^13.0.0
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  dio: ^5.3.0
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0
  cached_network_image: ^3.3.0
  image_picker: ^1.0.0
  carousel_slider: ^4.2.0
  shimmer: ^3.0.0
  
  youtube_player_iframe: ^4.0.0
  google_fonts: ^6.1.0
  intl: ^0.18.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/slider/
    - assets/icons/
    - assets/fonts/  